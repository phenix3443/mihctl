name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build binaries
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -o dist/mihctl-linux-amd64 ./cmd/mihctl
          GOOS=linux GOARCH=arm64 go build -o dist/mihctl-linux-arm64 ./cmd/mihctl
          GOOS=darwin GOARCH=arm64 go build -o dist/mihctl-darwin-arm64 ./cmd/mihctl
          GOOS=darwin GOARCH=amd64 go build -o dist/mihctl-darwin-amd64 ./cmd/mihctl
